<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>浏览器</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; background: #f0f0f0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; user-select: none; }
  .toolbar { display: flex; align-items: center; gap: 4px; padding: 4px 8px; background: #e1e1e1; border-bottom: 1px solid #ccc; flex-shrink: 0; }
  .nav-btn { width: 30px; height: 30px; border: none; background: transparent; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #444; font-size: 16px; }
  .nav-btn:hover { background: #d0d0d0; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-btn:disabled:hover { background: transparent; }
  .url-bar { flex: 1; height: 30px; border: 1px solid #b0b0b0; border-radius: 4px; padding: 0 10px; font-size: 13px; outline: none; background: #fff; font-family: 'Segoe UI', sans-serif; }
  .url-bar:focus { border-color: #0078d4; }
  .go-btn { height: 30px; padding: 0 12px; border: none; border-radius: 4px; background: #0078d4; color: #fff; font-size: 13px; cursor: pointer; }
  .go-btn:hover { background: #106ebe; }
  .main { flex: 1; position: relative; background: #fff; }
  iframe { width: 100%; height: 100%; border: none; }
  .status-bar { display: flex; align-items: center; justify-content: space-between; padding: 2px 10px; background: #e1e1e1; border-top: 1px solid #ccc; font-size: 11px; color: #666; flex-shrink: 0; }
  .status-left { display: flex; align-items: center; gap: 8px; }
  .status-right { display: flex; align-items: center; gap: 8px; }
  .ssl-icon { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
  .ssl-secure { background: #4caf50; }
  .ssl-insecure { background: #f44336; }
  .loading-bar { position: absolute; top: 0; left: 0; height: 2px; background: #0078d4; transition: width 0.3s ease; }
  .loading-bar.hidden { width: 0 !important; opacity: 0; }
  .new-tab { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #999; gap: 16px; }
  .new-tab-icon { font-size: 48px; opacity: 0.3; }
  .new-tab-tip { font-size: 14px; }
  .home-btn { text-decoration: none; color: #0078d4; font-size: 12px; cursor: pointer; }
  .home-btn:hover { text-decoration: underline; }
  .bookmark-bar { display: flex; align-items: center; gap: 2px; padding: 2px 8px; background: #e8e8e8; border-bottom: 1px solid #d0d0d0; flex-shrink: 0; font-size: 12px; }
  .bookmark-item { padding: 2px 8px; border-radius: 3px; cursor: pointer; color: #333; }
  .bookmark-item:hover { background: #d0d0d0; }
  .bookmark-sep { width: 1px; height: 16px; background: #ccc; margin: 0 4px; }
</style>
</head>
<body>
<div class="toolbar">
  <button class="nav-btn" id="backBtn" disabled title="后退">&#9664;</button>
  <button class="nav-btn" id="forwardBtn" disabled title="前进">&#9654;</button>
  <button class="nav-btn" id="refreshBtn" title="刷新">&#x21bb;</button>
  <input class="url-bar" id="urlBar" type="text" placeholder="输入网址或搜索内容" />
  <button class="go-btn" id="goBtn">转到</button>
</div>
<div class="bookmark-bar" id="bookmarkBar">
  <span class="bookmark-item" data-url="https://www.baidu.com">百度</span>
  <span class="bookmark-sep"></span>
  <span class="bookmark-item" data-url="https://www.bing.com">Bing</span>
  <span class="bookmark-sep"></span>
  <span class="bookmark-item" data-url="https://zh.wikipedia.org">维基百科</span>
  <span class="bookmark-sep"></span>
  <span class="bookmark-item" data-url="https://github.com">GitHub</span>
</div>
<div class="main" id="main">
  <div class="loading-bar hidden" id="loadingBar"></div>
  <div class="new-tab" id="newTab">
    <div class="new-tab-icon">&#x1F310;</div>
    <div class="new-tab-tip">输入网址开始浏览</div>
  </div>
  <iframe id="browserFrame" style="display:none" sandbox="allow-scripts allow-forms allow-popups allow-same-origin"></iframe>
</div>
<div class="status-bar">
  <div class="status-left">
    <span class="ssl-icon ssl-insecure" id="sslIcon"></span>
    <span id="statusText">就绪</span>
  </div>
  <div class="status-right">
    <span id="zoomText">100%</span>
  </div>
</div>
<script>
(function() {
  var backBtn = document.getElementById('backBtn');
  var forwardBtn = document.getElementById('forwardBtn');
  var refreshBtn = document.getElementById('refreshBtn');
  var urlBar = document.getElementById('urlBar');
  var goBtn = document.getElementById('goBtn');
  var browserFrame = document.getElementById('browserFrame');
  var newTab = document.getElementById('newTab');
  var loadingBar = document.getElementById('loadingBar');
  var statusText = document.getElementById('statusText');
  var sslIcon = document.getElementById('sslIcon');
  var zoomText = document.getElementById('zoomText');

  var history = [];
  var historyIndex = -1;
  var currentUrl = '';

  function updateNavButtons() {
    backBtn.disabled = historyIndex <= 0;
    forwardBtn.disabled = historyIndex >= history.length - 1;
  }

  function navigate(url) {
    if (!url || url.trim() === '') return;
    url = url.trim();
    // Auto-add https:// if no protocol
    if (!/^https?:\/\//i.test(url) && !/^file:/i.test(url) && !/^data:/i.test(url)) {
      // Check if it looks like a URL (contains dot) or a search query
      if (/\./.test(url) && !/\s/.test(url)) {
        url = 'https://' + url;
      } else {
        url = 'https://www.baidu.com/s?wd=' + encodeURIComponent(url);
      }
    }
    currentUrl = url;
    urlBar.value = url;

    // Manage history
    if (historyIndex >= 0 && history[historyIndex] === url) {
      // Same URL, just refresh
    } else {
      history = history.slice(0, historyIndex + 1);
      history.push(url);
      historyIndex = history.length - 1;
    }
    updateNavButtons();

    newTab.style.display = 'none';
    browserFrame.style.display = '';
    loadingBar.classList.remove('hidden');
    loadingBar.style.width = '30%';
    statusText.textContent = '正在加载...';
    sslIcon.className = 'ssl-icon ' + (url.startsWith('https://') ? 'ssl-secure' : 'ssl-insecure');

    // Use a proxy to avoid mixed content and CORS issues
    browserFrame.src = url;
  }

  // Listen for iframe load
  browserFrame.addEventListener('load', function() {
    loadingBar.style.width = '100%';
    setTimeout(function() {
      loadingBar.classList.add('hidden');
    }, 300);
    statusText.textContent = '完成';
    try {
      var title = browserFrame.contentDocument.title;
      if (title) {
        document.title = title + ' - 浏览器';
        // Notify parent window about title change
        window.parent.postMessage({ type: 'app-title', title: title }, '*');
      }
    } catch(e) {
      // Cross-origin, can't read title
    }
  });

  // Handle navigation errors
  browserFrame.addEventListener('error', function() {
    loadingBar.classList.add('hidden');
    statusText.textContent = '加载失败';
  });

  goBtn.addEventListener('click', function() { navigate(urlBar.value); });
  urlBar.addEventListener('keydown', function(e) { if (e.key === 'Enter') navigate(urlBar.value); });
  backBtn.addEventListener('click', function() {
    if (historyIndex > 0) {
      historyIndex--;
      navigate(history[historyIndex], true);
    }
  });
  forwardBtn.addEventListener('click', function() {
    if (historyIndex < history.length - 1) {
      historyIndex++;
      navigate(history[historyIndex], true);
    }
  });
  refreshBtn.addEventListener('click', function() { if (currentUrl) navigate(currentUrl); });

  // Bookmark clicks
  document.querySelectorAll('.bookmark-item').forEach(function(el) {
    el.addEventListener('click', function() { navigate(this.dataset.url); });
  });

  // Communicate with parent window (focus)
  document.addEventListener('mousedown', function() {
    window.parent.postMessage({ type: 'app-focus' }, '*');
  });

  // Start with a default page
  navigate('https://www.baidu.com');
})();
</script>
</body>
</html>
